<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>Makra – Nutrition for runners</title>
  <meta name="description" content="Makra is a nutrition app for runners that adapts your daily carbs, protein, and fat to your training." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
  <style>
    :root { --ink:#14201c; --muted:#5b6b64; --brand:#12B488; --rule:#e6ece9; --bg:#ffffff; }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body { margin:0; background:var(--bg); color:var(--ink); font:17px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .wrap { max-width:640px; margin:0 auto; padding:14vh 22px 80px; text-align:center; }
    .logo { width:96px; height:96px; border-radius:22px; margin:0 auto 24px; display:block; box-shadow:0 6px 24px rgba(18,180,136,0.18); }
    h1 { font-size:40px; line-height:1.1; margin:0 0 8px; letter-spacing:-0.02em; }
    .tagline { font-size:20px; color:var(--brand); font-weight:600; margin:0 0 18px; }
    p.desc { color:var(--muted); margin:0 auto 30px; max-width:46ch; }
    .links { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
    .links a { color:var(--brand); text-decoration:none; font-weight:600; border:1px solid var(--rule); border-radius:10px; padding:10px 18px; }
    .links a:hover { border-color:var(--brand); }
    footer { margin-top:48px; color:var(--muted); font-size:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="/favicon-512.png" alt="Makra app icon" />
    <h1>Makra</h1>
    <p class="tagline">Fuel your training with precision.</p>
    <p class="desc">A nutrition app for runners that adapts your daily carbs, protein, and fat to your training – more on hard days, back to baseline on rest days.</p>
    <div class="links">
      <a href="/privacy-policy">Privacy Policy</a>
      <a href="/support">Support</a>
    </div>
    <footer>© 2026 Makra</footer>
  </div>
</body>
</html>
